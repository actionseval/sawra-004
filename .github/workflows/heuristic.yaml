name: CI
# on: push
on: [repository_dispatch, workflow_dispatch]
jobs:
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
        python-version:
          - '3.13'
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Dependencies
        run: |
          sudo apt install -y base-files bash coreutils dash docker-ce-cli libc-bin libc6:amd64 libpython3.12-minimal:amd64 libpython3.12-stdlib:amd64 locales ncurses-base openssl python-is-python3 python3-apport python3-minimal python3-setuptools python3-zope.interface python3.12-minimal tzdata
          uv pip install uv==0.9.26
      - run: |
          uv sync --locked
      - run: |
          uv run pytest -n auto tests
    env:
      ACCEPT_EULA: Y
      BOOTSTRAP_HASKELL_NONINTERACTIVE: '1'
      DEBIAN_FRONTEND: noninteractive
      DOTNET_MULTILEVEL_LOOKUP: '0'
      DOTNET_NOLOGO: '1'
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
      HOMEBREW_CLEANUP_PERIODIC_FULL_DAYS: '3650'
      HOMEBREW_NO_AUTO_UPDATE: '1'
      HOSTNAME: pop-os
      ImageOS: ubuntu24
      ImageVersion: 20260111.209.1
      LC_CTYPE: C.UTF-8
      POWERSHELL_DISTRIBUTION_CHANNEL: GitHub-Actions-ubuntu24
      PYTEST_VERSION: 9.0.2
      PYTEST_XDIST_TESTRUNUID: e6eb577e08fe4014943c567a9f50e4e5
      PYTEST_XDIST_WORKER: gw4
      PYTEST_XDIST_WORKER_COUNT: '12'
      SHLVL: '1'
      TERM: xterm
      UV_RUN_RECURSION_DEPTH: '1'
      _PYI_LINUX_PROCESS_NAME: sawra
      _PYI_PARENT_PROCESS_LEVEL: '1'
